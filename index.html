<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- CSP (fixed) -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: blob: https://*.supabase.co https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com;
    connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.basemaps.cartocdn.com;
  ">

  <title>حفرة — Hafra.DZ</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    body { margin:0; font-family:'Cairo',sans-serif; background:#090C12; color:#fff; }
    #map { position:absolute; top:0; bottom:0; width:100%; }

    #header {
      position:absolute;
      top:0;
      left:0;
      right:0;
      z-index:1000;
      display:flex;
      justify-content:space-between;
      padding:10px;
      background:#111;
    }

    .menu-btn {
      background:#222;
      color:white;
      border:none;
      padding:10px;
      cursor:pointer;
    }

    #panel {
      position:absolute;
      top:0;
      left:0;
      width:250px;
      height:100%;
      background:#111;
      transform:translateX(-100%);
      transition:0.3s;
      z-index:1000;
    }

    #panel.open {
      transform:translateX(0);
    }

    #fab {
      position:absolute;
      bottom:20px;
      right:20px;
      background:#ff5722;
      color:white;
      border:none;
      width:60px;
      height:60px;
      border-radius:50%;
      font-size:24px;
      cursor:pointer;
    }

    #btn-locate {
      position:absolute;
      bottom:90px;
      right:20px;
      background:#222;
      color:white;
      border:none;
      width:50px;
      height:50px;
      border-radius:50%;
      cursor:pointer;
    }
  </style>
</head>

<body>

<!-- MAP -->
<div id="map"></div>

<!-- HEADER -->
<div id="header">
  <button class="menu-btn" onclick="togglePanel()">☰</button>
  <div>حفرة</div>
</div>

<!-- SIDE PANEL -->
<div id="panel">
  <h3 style="padding:20px;">Menu</h3>
</div>

<!-- FLOATING BUTTONS -->
<button id="btn-locate">📍</button>
<button id="fab">＋</button>

<!-- LIBRARIES (IMPORTANT) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- YOUR APP -->
<script src="app.js"></script>

</body>
</html>
